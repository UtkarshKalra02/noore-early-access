<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary SEO -->
    <title>Nooré Beauty | Spray-Based Skincare for Effortless Glow</title>
    <meta name="description" content="Nooré Beauty reimagines skincare with innovative spray-based products. Effortless, precise, and designed for modern lifestyles. Launching soon.">
    
    <!-- Keywords (not super important but still okay) -->
    <meta name="keywords" content="Noore Beauty, spray skincare, vitamin C serum, sunscreen spray, skincare India, beauty brand">
    
    <!-- Author -->
    <meta name="author" content="Nooré Beauty">
    
    <!-- Open Graph (for Instagram, WhatsApp, LinkedIn sharing) -->
    <meta property="og:title" content="Nooré Beauty — Glow has a new language">
    <meta property="og:description" content="Skincare reimagined in spray. Effortless, precise, and made for how you live.">
    <meta property="og:image" content="https://noorebeauty.co.in/logo.png">
    <meta property="og:url" content="https://noorebeauty.co.in">
    <meta property="og:type" content="website">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nooré Beauty — Spray-Based Skincare">
    <meta name="twitter:description" content="Effortless skincare in spray form. Launching soon.">
    <meta name="twitter:image" content="https://noorebeauty.co.in/logo.png">
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    
    <!-- Canonical (VERY IMPORTANT) -->
    <link rel="canonical" href="https://noorebeauty.co.in/">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --plum:   #8B3A62;
    --plum-d: #6b2b4a;
    --gold:   #C9A84C;
    --gold-l: #e2c97a;
    --charcoal: #1A1A1A;
    --sage:   #8A9E8C;
    --blush:  #F5EDF1;
    --blush-d: #eddde8;
    --white:  #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--charcoal);
    color: var(--blush);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ── Ambient blobs ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    pointer-events: none;
    z-index: 0;
  }
  .blob-plum {
    width: 500px; height: 500px;
    background: var(--plum);
    opacity: 0.18;
    top: -120px; left: -140px;
  }
  .blob-gold {
    width: 360px; height: 360px;
    background: var(--gold);
    opacity: 0.10;
    bottom: 60px; right: -100px;
  }
  .blob-sage {
    width: 280px; height: 280px;
    background: var(--sage);
    opacity: 0.09;
    top: 50%; left: 60%;
    transform: translate(-50%, -50%);
  }

  /* ── Layout ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
    text-align: center;
  }

  /* ── Logo mark ── */
  .logomark {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}

.logomark-img {
  width: 300px;   /* adjust based on your design */
  height: auto;
  object-fit: contain;
}
  .logomark-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    position: relative;
  }
  .logomark-ring::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 0.5px solid rgba(201,168,76,0.2);
  }
  .logomark-n {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .logomark-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(245,237,241,0.4);
  }

  /* ── Eyebrow ── */
  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
  }

  /* ── Headline ── */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 9vw, 84px);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: var(--blush);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  /* ── Divider ── */
  .divider {
    width: 36px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto;
    opacity: 0;
    animation: fadeIn 1s ease 0.55s forwards;
  }

  /* ── Subtext ── */
  .subtext {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 300;
    font-style: italic;
    color: rgba(245,237,241,0.6);
    max-width: 480px;
    line-height: 1.6;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  }

  /* ── Form ── */
  .form-wrap {
    width: 100%;
    max-width: 440px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22,1,0.36,1) 0.75s forwards;
  }

  .input-row {
    display: flex;
    gap: 0;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;
    overflow: hidden;
    transition: border-color 0.3s;
    background: rgba(26,26,26,0.6);
    backdrop-filter: blur(12px);
  }
  .input-row:focus-within {
    border-color: rgba(201,168,76,0.7);
  }

  .email-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--blush);
    caret-color: var(--gold);
  }
  .email-input::placeholder {
    color: rgba(245,237,241,0.28);
    letter-spacing: 0.08em;
    font-size: 11px;
    text-transform: uppercase;
  }

  .submit-btn {
    background: var(--gold);
    border: none;
    padding: 16px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--charcoal);
    cursor: pointer;
    transition: background 0.25s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .submit-btn:hover { background: var(--gold-l); }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Status messages ── */
  .status {
    margin-top: 16px;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-height: 18px;
    transition: opacity 0.4s;
  }
  .status.success { color: var(--sage); }
  .status.error   { color: #c97a7a; }

  /* ── Privacy note ── */
  .privacy {
    margin-top: 12px;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,237,241,0.2);
  }

  /* ── Tagline footer ── */
  .tagline-footer {
    margin-top: 72px;
    opacity: 0;
    animation: fadeIn 1.2s ease 1.1s forwards;
  }
  .tagline-footer p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 300;
    font-style: italic;
    color: rgba(245,237,241,0.18);
    letter-spacing: 0.12em;
  }

  /* ── Counter strip ── */
  .counter-strip {
    margin-top: 48px;
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 1s ease 1.0s forwards;
  }
  .counter-item { text-align: center; }
  .counter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold);
    display: block;
  }
  .counter-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,237,241,0.25);
  }
  .counter-sep {
    width: 0.5px;
    height: 36px;
    background: rgba(201,168,76,0.2);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Success state ── */
  .form-wrap.submitted .input-row { display: none; }
  .form-wrap.submitted .privacy   { display: none; }
  .form-wrap.submitted .status {
    font-size: 14px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    text-transform: none;
    letter-spacing: 0.05em;
    color: var(--blush);
  }

  /* ── Mobile ── */
  @media (max-width: 520px) {
    .input-row { flex-direction: column; border-radius: 2px; }
    .submit-btn { padding: 15px; width: 100%; text-align: center; }
    .counter-strip { gap: 24px; }
  }
</style>
</head>
<body>

<div class="blob blob-plum"></div>
<div class="blob blob-gold"></div>
<div class="blob blob-sage"></div>

<main class="page">

  <div class="logomark">
    <img src="websitelogonooretm.png" alt="Noore Beauty Logo" class="logomark-img">
  </div>

  <p class="eyebrow">Something is coming</p>

  <h1>Glow has a<br><em>new language.</em></h1>

  <div class="divider"></div>

  <p class="subtext">
    Skincare reimagined in spray. Effortless, precise, and made for how you actually live.
  </p>

  <div class="form-wrap" id="formWrap">
    <div class="input-row">
      <input
        class="email-input"
        type="email"
        id="emailInput"
        placeholder="Your email address"
        autocomplete="email"
        required
      />
      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        Join Waitlist
      </button>
    </div>
    <div class="status" id="statusMsg"></div>
    <p class="privacy">No spam. Early access only.</p>
  </div>

  <div class="counter-strip">
    <div class="counter-item">
      <span class="counter-num" id="counter">—</span>
      <span class="counter-label">On the list</span>
    </div>
    <div class="counter-sep"></div>
    <div class="counter-item">
      <span class="counter-num">2</span>
      <span class="counter-label">Launch SKUs</span>
    </div>
    <div class="counter-sep"></div>
    <div class="counter-item">
      <span class="counter-num">Soon</span>
      <span class="counter-label">Launch date</span>
    </div>
  </div>

  <div class="tagline-footer">
    <p>Spray the glow on.</p>
  </div>

</main>

<script>
  // ── REPLACE THIS with your Google Apps Script Web App URL ──
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxE4JxOsPRo1yitMjgreaQ7CbN_77xS8yHi4mmgRZUXGkmpbtsbgBo12sIy9QOpJjwb/exec';

  async function handleSubmit() {
    const emailInput = document.getElementById('emailInput');
    const submitBtn  = document.getElementById('submitBtn');
    const statusMsg  = document.getElementById('statusMsg');
    const formWrap   = document.getElementById('formWrap');
    const email = emailInput.value.trim();

    if (!email || !email.includes('@')) {
      statusMsg.textContent = 'Please enter a valid email.';
      statusMsg.className = 'status error';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Joining...';
    statusMsg.textContent = '';
    statusMsg.className = 'status';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          timestamp: new Date().toISOString(),
          source: document.referrer || 'direct'
        })
      });

      // no-cors means we can't read response, so assume success
      formWrap.classList.add('submitted');
      statusMsg.textContent = 'You\'re on the list. We\'ll reach you first.';
      statusMsg.className = 'status success';
      updateCounter();

    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Join Waitlist';
      statusMsg.textContent = 'Something went wrong. Try again.';
      statusMsg.className = 'status error';
    }
  }

  function updateCounter() {
    const el = document.getElementById('counter');
    // Optionally fetch real count from your script — for now cosmetic increment
    const stored = parseInt(localStorage.getItem('nwl_count') || '0') + 1;
    localStorage.setItem('nwl_count', stored);
    el.textContent = stored;
  }

  // Allow Enter key
  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
